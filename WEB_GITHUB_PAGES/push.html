<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0f766e"><link rel="manifest" href="./manifest.webmanifest"><link rel="apple-touch-icon" href="./icons/icon-192.png"><title>Cảnh báo máy ấp trứng</title><style>
:root{--bg:#f4f7f6;--surface:#fff;--text:#10231f;--muted:#6b7d78;--line:#dce6e2;--primary:#0f766e;--danger:#b93434}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px/1.5 system-ui,-apple-system,sans-serif}.app{max-width:540px;margin:auto;padding:18px 14px 40px}.hero{padding:18px;border-radius:20px;background:#10342e;color:#fff}.hero h1{margin:0;font-size:23px}.hero p{margin:6px 0 0;color:#bad1cb;font-size:12px}.card{margin-top:13px;padding:17px;border:1px solid var(--line);border-radius:17px;background:var(--surface);box-shadow:0 10px 30px #173b3310}.card h2{margin:0 0 12px;font-size:17px}.field{display:grid;gap:6px;margin-top:11px}.field span{font-size:11px;font-weight:800}input{width:100%;min-height:50px;padding:0 13px;border:1px solid var(--line);border-radius:12px;font-size:16px}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}button,a.button{min-height:50px;border:0;border-radius:12px;font-weight:850;display:grid;place-items:center;text-decoration:none;font-size:13px}button.primary{background:var(--primary);color:#fff}button.ghost,a.ghost{background:#eef5f3;color:var(--text)}.status{padding:12px;border-radius:12px;background:#eef5f3;font-size:12px}.device{display:flex;justify-content:space-between;gap:10px;padding:12px 0;border-top:1px solid var(--line)}.device:first-child{border-top:0}.device small{display:block;color:var(--muted)}.danger{color:var(--danger)}@media(max-width:360px){.actions{grid-template-columns:1fr}}
</style></head><body><main class="app"><section class="hero"><h1>Cảnh báo máy ấp trứng</h1><p>PWA trên GitHub Pages · nhận Web Push qua Cloudflare Worker.</p></section><section class="card"><h2>Kết nối Worker</h2><label class="field"><span>Địa chỉ Worker</span><input id="workerUrl" type="url" placeholder="https://mayap-alert.ten-ban.workers.dev"></label><div class="actions"><button class="ghost" id="saveWorker">Lưu Worker</button><button class="primary" id="enablePush">Bật thông báo</button></div><p class="status" id="pushStatus">Chưa kiểm tra quyền thông báo.</p></section><section class="card"><h2>Thêm thiết bị</h2><label class="field"><span>ID thiết bị</span><input id="deviceId" placeholder="MAP-A1B2"></label><label class="field"><span>Khóa riêng thiết bị</span><input id="deviceKey" type="password" placeholder="Khóa đã tạo trong web ESP32"></label><div class="actions"><button class="primary" id="addDevice">Thêm và đăng ký</button><button class="ghost" id="testLocal">Thông báo thử</button></div></section><section class="card"><h2>Thiết bị đã đăng ký</h2><div id="devices"></div></section><section class="card"><div class="actions"><a class="button ghost" href="./">Về giao diện chính</a></div></section></main><script src="./push.js"></script></body></html>
